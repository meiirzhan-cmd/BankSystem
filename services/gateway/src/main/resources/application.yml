server:
  port: 8090

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Route definitions - this is where all URL mapping lives
            # Account Service
            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/v1/accounts/**
            
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**

          # CORS: allow frontends to call the API  
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - http://localhost:3000
                  - http://localhost:3001
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          
  data:
    redis:
      host: localhost
      port: 6379
      password: bank_redis
  
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: http://localhost:8080/realms/bank

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

---
# Docker profile: activated when running inside Docker Compose
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/bank
          jwk-set-uri: http://keycloak:8080/realms/bank/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka/